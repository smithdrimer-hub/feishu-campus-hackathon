# OpenClaw Memory Engine example config.
# Copy to config.local.yaml and fill in real values.

project_id: openclaw-memory-demo
default_backend: lark-cli
lark_cli:
  executable: lark-cli.cmd
  default_identity: user
data:
  dir: data
safety:
  auto_execute_readonly: true
  auto_execute_writes: false

# LLM config (optional, defaults to FakeLLMProvider if not set)
# llm:
#   provider: "openai"                       # "openai" or "fake"
#   api_key_env: "OPENAI_API_KEY"            # env var name for API key
#   api_key: "sk-your-key-here"              # or set key directly (takes priority)
#   base_url: "https://api.openai.com/v1"    # any OpenAI-compatible endpoint
#   model: "gpt-4o-mini"
#   temperature: 0.1
#   max_tokens: 2000

# Embedding config (optional, disables vector semantic search if not set)
# embedding:
#   provider: "openai"                       # "openai" | "fake" | omit to disable
#   api_key: "ek-your-key-here"              # sk-... (OpenAI) or ek-... (electronhub relay)
#   api_key_env: "OPENAI_API_KEY"            # lower priority than api_key
#   base_url: "https://api.electronhub.ai/v1"  # any OpenAI-compatible endpoint
#   model: "text-embedding-3-small"          # recommended for Chinese + English
#   similarity_threshold: 0.35               # tuned for Chinese short text
