# OpenClaw Memory Engine example config.
# 复制为 config.local.yaml 并填入真实值。

project_id: openclaw-memory-demo
default_backend: lark-cli
lark_cli:
  executable: lark-cli.cmd
  default_identity: user
data:
  dir: data
safety:
  auto_execute_readonly: true
  auto_execute_writes: false
# LLM 配置（可选，不配置则使用 FakeLLMProvider）
# llm:
#   provider: "openai"                  # "openai" 或 "fake"
#   api_key_env: "OPENAI_API_KEY"       # API key 所在的环境变量名
#   api_key: "sk-your-key-here"         # 或直接写 key（优先级高于 api_key_env）
#   base_url: "https://api.openai.com/v1"  # 兼容接口的地址
#   model: "gpt-4o-mini"               # 模型名
#   temperature: 0.1
#   max_tokens: 2000
