# OpenClaw Memory Engine — 配置模板
# 复制为 config.yaml 并填入实际值

projects:
  - chat_id: "oc_xxx"           # 飞书群聊 ID
    project_id: "my-project"    # 项目标识
    data_dir: "data/"           # 数据存储目录

auto_sync:
  enabled: true                 # 是否启用每日自动同步
  time: "09:00"                 # 同步时间（24小时制）
  mode: "preview"               # preview: 仅生成面板 | auto: 自动执行

event_listener:
  enabled: false                # 是否启用 WebSocket 事件监听
  event_types: "im.message.receive_v1"
  heartbeat_timeout: 90         # 心跳超时秒数
  reconnect_max_delay: 60       # 重连最大延迟秒数

demo:
  dry_run: true                 # true: 不发消息不创建任务 | false: 正常执行

# 权限与安全
auth:
  admins: []                    # 管理员 open_id 列表（可查看其他用户数据）
  verify_chat_membership_before_write: false  # 发消息前验证 bot 在群内

# 存储（默认 JSON 文件，可选 sqlite）
storage:
  backend: "json"               # "json" | "sqlite"

# LLM 配置（密钥请放在 config.local.yaml 中，不要放这里）
llm:
  provider: "openai"
  api_key: ""                   # 留空，在 config.local.yaml 中填写
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-v4-pro"
  temperature: 0.1
  max_tokens: 2000

# Embedding 配置（密钥请放在 config.local.yaml 中）
embedding:
  provider: "openai"
  api_key: ""                   # 留空，在 config.local.yaml 中填写
  base_url: "https://api.electronhub.ai/v1"
  model: "text-embedding-3-small"
  similarity_threshold: 0.35
